# CAN 信号字段映射配置
# 机器可解析的配置文件，供 Agent 运行时加载映射规则

module: can_signal
version: "2.0"
description: "CAN 信号表解析配置 — 供 Agent 读取后自行执行解析流程"

# ─── Sheet 识别规则 ───
sheet_patterns:
  include:
    - "Tx_*"
    - "Rx_*"
    - "*_CAN*"
    - "*Can*"
  exclude:
    - "*Gateway*"
    - "*路由*"
    - "*LIN*"

# ─── 字段定义 ───
# 每个 parameter 包含：
#   name: AUTOSAR 标准字段名（与原始代码 excel_prompts.py / build_can_message 一致）
#   keywords: Excel 列标题的可能写法（中英文同义词，按优先级排列）
#   format: 数据类型
#   required: 是否必填
#   default: 缺省值
#   level: "message" = 帧级字段 / "signal" = 信号级字段

parameters:
  # ─── 帧级字段（message level）───
  - name: EcuName
    keywords: ["ECU (Tx)", "ECU", "EcuName", "节点", "发送节点", "接收节点", "Transmitter"]
    format: string
    required: false
    level: message

  - name: MsgName
    keywords: ["Msg Name", "Message Name", "Frame Name", "报文名", "帧名", "FrameName"]
    format: string
    required: true
    level: message
    validation:
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      max_length: 128
    note: "原始代码使用 MsgName 作为分组字段（等同于 FrameName）"

  - name: MsgId
    keywords: ["Msg ID (hex)", "Message ID", "CAN ID", "Frame ID", "Identifier", "报文ID", "帧ID"]
    format: hex
    required: true
    level: message
    conversion: "parse_hex"

  - name: MsgLength
    keywords: ["Msg Length (bytes)", "Message Length", "DLC", "Byte Length", "报文长度", "长度"]
    format: int
    required: false
    default: 8
    level: message
    validation:
      min: 0
      max: 64
    conversion: "int()"

  - name: MsgSendType
    keywords: ["Msg Send Type", "Send Type", "SendType", "Tx Type", "发送类型"]
    format: enum
    required: false
    level: message

  - name: MsgCycleTime
    keywords: ["Msg Cycle Time (ms)", "Cycle Time", "周期", "MsgCycleTime"]
    format: int
    required: false
    level: message
    conversion: "int()"

  - name: MsgDelayTime
    keywords: ["Msg Delay Time", "Delay Time", "延迟时间", "MsgDelayTime"]
    format: int
    required: false
    level: message
    conversion: "int()"

  - name: Offset
    keywords: ["Offset", "偏移"]
    format: int
    required: false
    level: message
    conversion: "int()"

  - name: MsgNrOfReption
    keywords: ["Nr of Repetition", "MsgNrOfReption", "重复次数", "Repetition"]
    format: int
    required: false
    level: message
    conversion: "int()"

  - name: MsgType
    keywords: ["Msg Type", "Message Type", "报文类型", "MsgType"]
    format: string
    required: false
    level: message

  # ─── 信号级字段（signal level）───
  - name: ShortName
    keywords: ["Signal Name", "ShortName", "信号名", "信号名称"]
    format: string
    required: true
    level: signal
    validation:
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      max_length: 128

  - name: BitPosition
    keywords: ["Start Bit Position", "Start Bit", "Bit Position", "起始位", "BitPosition"]
    format: int
    required: true
    level: signal
    validation:
      min: 0
      max: 511
    conversion: "int()"

  - name: BitSize
    keywords: ["Signal Length", "Bit Size", "Bit Length", "信号长度", "BitSize", "Length", "位长度"]
    format: int
    required: true
    level: signal
    validation:
      min: 1
      max: 64
    conversion: "int()"

  - name: SignalType
    keywords: ["Value Type", "Signal Type", "Data Type", "信号类型", "数据类型"]
    format: enum
    required: false
    level: signal

  - name: SignalEndianness
    keywords: ["Byte Order", "Endianness", "字节序"]
    format: enum
    required: false
    level: signal

  - name: SignalInitValue
    keywords: ["Init Value", "Initial Value", "初始值", "Init"]
    format: number
    required: false
    level: signal

  - name: SignalMinValue
    keywords: ["Signal Min Value (phys)", "Min Value", "最小值", "Minimum", "Min"]
    format: number
    required: false
    level: signal
    conversion: "float()"

  - name: SignalMaxValue
    keywords: ["Signal Max Value (phys)", "Max Value", "最大值", "Maximum", "Max"]
    format: number
    required: false
    level: signal
    conversion: "float()"

  - name: SignalDefaultValue
    keywords: ["Default Value (hex)", "Default Value", "默认值"]
    format: hex
    required: false
    level: signal
    conversion: "parse_hex"

  - name: TimeoutValue
    keywords: ["Timeout Value (hex)", "Timeout Value", "超时值"]
    format: hex
    required: false
    level: signal

  - name: SignalDataInvalidValue
    keywords: ["Invalid Value (hex)", "Invalid Value", "无效值"]
    format: hex
    required: false
    level: signal

  - name: TransferProperty
    keywords: ["Transfer Property", "传输属性", "TransferProperty"]
    format: string
    required: false
    level: signal

  - name: UpdateBitPosition
    keywords: ["Update Bit Position", "更新位", "UpdateBitPosition"]
    format: int
    required: false
    level: signal

  - name: SystemTemplateSystemSignalRef
    keywords: ["System Signal Ref", "系统信号引用", "SystemTemplateSystemSignalRef"]
    format: string
    required: false
    level: signal

  - name: Remark
    keywords: ["Remark", "备注", "Comment", "Description", "说明"]
    format: string
    required: false
    level: signal

# ─── 枚举映射 ───
# 重要：为与原始解析结果保持一致，所有枚举字段
#       不做枚举标准化转换，保持 Excel 中的原始值。
#       下面的映射表仅供 Agent 理解枚举含义时参考，不用于自动转换。
enum_mappings:
  MsgSendType:
    normalize_on_extract: false  # false = 保持 Excel 原始值，不做转换
    reference:
      "Cyclic": "周期帧"
      "cyclic": "周期帧"
      "cycle": "周期帧"
      "周期": "周期帧"
      "Event": "事件触发帧"
      "event": "事件触发帧"
      "on change": "事件触发帧"
      "事件": "事件触发帧"
      "None": "不发送"
      "none": "不发送"
      "no send": "不发送"
      "不发送": "不发送"
  SignalEndianness:
    normalize_on_extract: false  # false = 保持 Excel 原始值
    reference:
      "Motorola": "BIG_ENDIAN — 大端序"
      "motorola": "BIG_ENDIAN — 大端序"
      "Big": "BIG_ENDIAN — 大端序"
      "big": "BIG_ENDIAN — 大端序"
      "MSB": "BIG_ENDIAN — 大端序"
      "msb": "BIG_ENDIAN — 大端序"
      "Big Endian": "BIG_ENDIAN — 大端序"
      "大端": "BIG_ENDIAN — 大端序"
      "Intel": "LITTLE_ENDIAN — 小端序"
      "intel": "LITTLE_ENDIAN — 小端序"
      "Little": "LITTLE_ENDIAN — 小端序"
      "little": "LITTLE_ENDIAN — 小端序"
      "LSB": "LITTLE_ENDIAN — 小端序"
      "lsb": "LITTLE_ENDIAN — 小端序"
      "Little Endian": "LITTLE_ENDIAN — 小端序"
      "小端": "LITTLE_ENDIAN — 小端序"
  SignalType:
    normalize_on_extract: false  # false = 保持 Excel 原始值
    reference:
      "uint": "unsigned — 无符号整数"
      "unsigned": "unsigned — 无符号整数"
      "无符号": "unsigned — 无符号整数"
      "int": "signed — 有符号整数"
      "signed": "signed — 有符号整数"
      "有符号": "signed — 有符号整数"
      "float": "float — 浮点数"
      "浮点": "float — 浮点数"

# ─── 分组配置 ───
grouping:
  group_by: ["MsgName"]
  message_level_fields:
    - EcuName
    - MsgName
    - MsgId
    - MsgLength
    - MsgSendType
    - MsgCycleTime
    - MsgDelayTime
    - Offset
    - MsgNrOfReption
    - MsgType
  signal_collect_field: signals

# ─── 方向判断 ───
# CAN 信号表的方向判断使用双模式：
#   1. 主规则：从 sheet 名前缀推断方向和通道名
#   2. 回退规则：当 sheet 名无 Tx_/Rx_ 前缀时，由 EcuName 字段值判断
direction_config:
  # 主规则：sheet 名前缀
  primary:
    method: sheet_prefix
    prefixes:
      "Tx_": "TX"
      "Rx_": "RX"
    # 去掉前缀后的剩余部分作为 channel_name
    # 例如: "Tx_CAN_FLZCU_BD" → channel_name="CAN_FLZCU_BD", direction="TX"

  # 回退规则：当 sheet 名无 Tx_/Rx_ 前缀时
  fallback:
    method: field_value
    field: EcuName
    tx_values: ["CCU", "CCURT1", "CCURT2"]
    default: "RX"

# ─── 默认值字段 ───
# 原始代码 build_can_message() 后为每个 signal 添加默认属性。
# Agent 在 build_module_metadata 组装完成后，需为每个 signal 补充以下字段：
signal_defaults:
  - name: ComTransferProperty
    value: "TRIGGERED"
    type: "default"
  - name: ComSignalEndianness
    value: "BIG_ENDIAN"
    type: "default"
  - name: ComUpdateBitPosition
    value: null
    type: "default"

# ─── 数据校验规则 ───
validation_rules:
  required_fields: ["MsgName", "MsgId", "ShortName", "BitPosition", "BitSize"]
  mapping_coverage_threshold: 0.8

# ─── 输出路径 ───
output_schema:
  root_path: "AUTOSAR.RequirementsData.CommunicationStack.Can"
  key_by: channel_name
  structure: "{channel_name: {TX: [...messages], RX: [...messages]}}"
